name: Deploy to Server

on:
  push:
    branches:
      - main
      - claude/improve-bot-zQpBF

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd /root/tysmith-bot
            git fetch origin
            git checkout claude/improve-bot-zQpBF
            git pull origin claude/improve-bot-zQpBF
            pip install -r requirements.txt -q
            systemctl restart tysmith-bot
            echo "Deploy done: $(date)"
